<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão da Copa</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#111827;
    color:white;
    margin:0;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:#1f2937;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

input{
    padding:8px;
    border:none;
    border-radius:5px;
    margin:5px;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:#2563eb;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    border:1px solid #374151;
    padding:8px;
    text-align:center;
}

.rank1 { color:gold; }
.rank2 { color:silver; }
.rank3 { color:#cd7f32; }

.hidden{
    display:none;
}
</style>
</head>
<body>

<div class="container">

    <h1>🏆 Bolão da Copa</h1>

    <div id="loginCard" class="card">
        <h2>Entrar</h2>

        <input id="nickname" placeholder="Seu apelido">
        <button onclick="login()">Entrar</button>
    </div>

    <div id="app" class="hidden">

        <div class="card">
            <h2>👤 Jogador: <span id="currentUser"></span></h2>
            <button onclick="logout()">Sair</button>
        </div>

        <div class="card">
            <h2>⚽ Jogos</h2>
            <div id="matches"></div>
        </div>

        <div class="card">
            <h2>🛠 Admin (Resultados)</h2>

            <input id="adminPass" placeholder="Senha Admin">

            <div id="adminArea"></div>
        </div>

        <div class="card">
            <h2>🏅 Ranking</h2>
            <div id="ranking"></div>
        </div>

    </div>

</div>

<script>

// ----------------------
// CONFIG
// ----------------------

const ADMIN_PASSWORD = "123456";

// ----------------------
// STORAGE
// ----------------------

function load(key, defaultValue){
    return JSON.parse(localStorage.getItem(key)) || defaultValue;
}

function save(key, value){
    localStorage.setItem(key, JSON.stringify(value));
}

// ----------------------
// DADOS INICIAIS
// ----------------------

let users = load("users", []);

let matches = load("matches", [
    {
        id:1,
        home:"Brasil",
        away:"Argentina",
        date:"2026-06-15T16:00"
    },
    {
        id:2,
        home:"França",
        away:"Alemanha",
        date:"2026-06-16T18:00"
    },
    {
        id:3,
        home:"Espanha",
        away:"Portugal",
        date:"2026-06-17T21:00"
    }
]);

let predictions = load("predictions", []);
let results = load("results", []);

let currentUser = localStorage.getItem("currentUser");

// ----------------------
// LOGIN
// ----------------------

function login(){

    const nickname =
        document.getElementById("nickname")
        .value
        .trim();

    if(!nickname) return;

    let user =
        users.find(
            u => u.name.toLowerCase() === nickname.toLowerCase()
        );

    if(!user){
        user = {
            id: Date.now().toString(),
            name: nickname
        };

        users.push(user);
        save("users", users);
    }

    currentUser = user.id;

    localStorage.setItem(
        "currentUser",
        currentUser
    );

    render();
}

function logout(){
    localStorage.removeItem("currentUser");
    location.reload();
}

// ----------------------
// PALPITES
// ----------------------

function savePrediction(matchId){

    const g1 =
        Number(document.getElementById(
            `home-${matchId}`
        ).value);

    const g2 =
        Number(document.getElementById(
            `away-${matchId}`
        ).value);

    let pred =
        predictions.find(
            p =>
            p.userId === currentUser &&
            p.matchId === matchId
        );

    if(pred){
        pred.homeGoals = g1;
        pred.awayGoals = g2;
    }else{
        predictions.push({
            userId:currentUser,
            matchId,
            homeGoals:g1,
            awayGoals:g2
        });
    }

    save("predictions", predictions);

    alert("Palpite salvo!");
    render();
}

// ----------------------
// RESULTADOS
// ----------------------

function saveResult(matchId){

    const pass =
        document.getElementById("adminPass")
        .value;

    if(pass !== ADMIN_PASSWORD){
        alert("Senha incorreta");
        return;
    }

    const g1 =
        Number(document.getElementById(
            `result-home-${matchId}`
        ).value);

    const g2 =
        Number(document.getElementById(
            `result-away-${matchId}`
        ).value);

    let result =
        results.find(
            r => r.matchId === matchId
        );

    if(result){
        result.homeGoals = g1;
        result.awayGoals = g2;
    }else{
        results.push({
            matchId,
            homeGoals:g1,
            awayGoals:g2
        });
    }

    save("results", results);

    render();
}

// ----------------------
// PONTUAÇÃO
// ----------------------

function calculatePoints(pred, result){

    if(
        pred.homeGoals === result.homeGoals &&
        pred.awayGoals === result.awayGoals
    ){
        return 10;
    }

    const predDiff =
        pred.homeGoals - pred.awayGoals;

    const resultDiff =
        result.homeGoals - result.awayGoals;

    if(
        predDiff === 0 &&
        resultDiff === 0
    ){
        return 3;
    }

    if(
        (predDiff > 0 && resultDiff > 0) ||
        (predDiff < 0 && resultDiff < 0)
    ){
        return 5;
    }

    return 0;
}

// ----------------------
// RANKING
// ----------------------

function buildRanking(){

    const ranking = users.map(user => {

        let total = 0;

        predictions
            .filter(
                p => p.userId === user.id
            )
            .forEach(pred => {

                const result =
                    results.find(
                        r =>
                        r.matchId === pred.matchId
                    );

                if(result){
                    total += calculatePoints(
                        pred,
                        result
                    );
                }
            });

        return {
            name:user.name,
            points:total
        };
    });

    ranking.sort(
        (a,b) =>
        b.points - a.points
    );

    return ranking;
}

// ----------------------
// RENDER
// ----------------------

function render(){

    if(!currentUser){
        return;
    }

    document
        .getElementById("loginCard")
        .classList.add("hidden");

    document
        .getElementById("app")
        .classList.remove("hidden");

    const user =
        users.find(
            u => u.id === currentUser
        );

    document
        .getElementById("currentUser")
        .innerText = user.name;

    // JOGOS

    let html = "";

    matches.forEach(match => {

        const pred =
            predictions.find(
                p =>
                p.userId === currentUser &&
                p.matchId === match.id
            );

        html += `
        <div class="card">
            <strong>
            ${match.home}
            x
            ${match.away}
            </strong>

            <br>
            ${new Date(match.date).toLocaleString()}

            <br><br>

            <input
                id="home-${match.id}"
                type="number"
                min="0"
                value="${pred?.homeGoals ?? ''}"
                style="width:60px">

            <input
                id="away-${match.id}"
                type="number"
                min="0"
                value="${pred?.awayGoals ?? ''}"
                style="width:60px">

            <button
                onclick="savePrediction(${match.id})">
                Salvar
            </button>
        </div>
        `;
    });

    document
        .getElementById("matches")
        .innerHTML = html;

    // ADMIN

    let adminHtml = "";

    matches.forEach(match => {

        const result =
            results.find(
                r => r.matchId === match.id
            );

        adminHtml += `
        <div style="margin-bottom:10px">

            ${match.home}
            x
            ${match.away}

            <br>

            <input
                id="result-home-${match.id}"
                type="number"
                value="${result?.homeGoals ?? ''}"
                style="width:60px">

            <input
                id="result-away-${match.id}"
                type="number"
                value="${result?.awayGoals ?? ''}"
                style="width:60px">

            <button
                onclick="saveResult(${match.id})">
                Salvar Resultado
            </button>

        </div>
        `;
    });

    document
        .getElementById("adminArea")
        .innerHTML = adminHtml;

    // RANKING

    const ranking = buildRanking();

    let rankingHtml =
    `
    <table>
        <tr>
            <th>#</th>
            <th>Jogador</th>
            <th>Pontos</th>
        </tr>
    `;

    ranking.forEach((p,index)=>{

        let cls = "";

        if(index===0) cls="rank1";
        if(index===1) cls="rank2";
        if(index===2) cls="rank3";

        rankingHtml += `
        <tr class="${cls}">
            <td>${index+1}</td>
            <td>${p.name}</td>
            <td>${p.points}</td>
        </tr>
        `;
    });

    rankingHtml += "</table>";

    document
        .getElementById("ranking")
        .innerHTML = rankingHtml;
}

render();

</script>

</body>
</html>
